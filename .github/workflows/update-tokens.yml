name: Update tokens

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      tokens:
        description: "Image keys to refresh: chainId_address, space- or comma-separated. The backend logoURI must already point to the corrected image. Leave empty for a normal full update."
        required: false
        default: ""

concurrency:
  group: update-tokens
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update-tokens:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Cache file-only system dependencies
        # ffmpeg + its codec deps are ~80 MB of the 111 MB apt download. Cache
        # those .deb files so the slow apt path only runs on cache miss. The
        # day the Azure mirror was throttled to 96 kB/s, this single step took
        # 19m 37s — caching makes the bad path bounded to first run. `version`
        # is the cache key — bump to invalidate.
        #
        # imagemagick is NOT here: its postinst registers `convert`/`magick`
        # via update-alternatives, and the cache action cannot reliably restore
        # those symlinks even with `execute_install_scripts: true` (the
        # action's README documents this caveat). It is installed separately
        # below; ~10 MB on its own, a few seconds.
        #
        # jq and wget are dropped — both are pre-installed on ubuntu-latest.
        uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          packages: librsvg2-bin webp ffmpeg
          version: 1.0

      - name: Install imagemagick
        run: sudo apt-get install -y imagemagick

      - name: Install Node dependencies
        run: yarn install --frozen-lockfile

      - name: Prepare images to refresh
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.tokens != '' }}
        env:
          # Pass the input through the environment (never interpolate ${{ }}
          # into the script) so it cannot be used for shell injection.
          TOKENS: ${{ inputs.tokens }}
        run: |
          set -euo pipefail
          refresh_keys="$RUNNER_TEMP/token-refresh-keys.txt"
          backup_dir="$RUNNER_TEMP/token-refresh-backup"
          mkdir -p "$backup_dir"
          : > "$refresh_keys"

          for key in $(printf '%s' "$TOKENS" | tr ',' ' '); do
            # Keys are <chainId>_<address>; reject anything else to prevent
            # path traversal via the constructed file path.
            if ! printf '%s' "$key" | grep -qE '^[A-Za-z0-9_-]+$'; then
              echo "Skipping invalid token key: $key"
              continue
            fi
            target="images/migration/webp/${key}.webp"
            printf '%s\n' "$key" >> "$refresh_keys"
            if [ -f "$target" ]; then
              echo "Refreshing $key"
              cp "$target" "$backup_dir/${key}.webp"
              rm -f "$target"
            else
              echo "No existing image for $key — it will be fetched if the API has it"
            fi
          done

      - name: Run update-tokens
        env:
          SQUID_API_URL: ${{ vars.SQUID_API_URL }}
          SQUID_INTEGRATOR_ID: ${{ vars.SQUID_INTEGRATOR_ID }}
        run: yarn update-tokens

      - name: Restore refresh images that were not replaced
        if: ${{ always() && github.event_name == 'workflow_dispatch' && inputs.tokens != '' }}
        run: |
          set -euo pipefail
          refresh_keys="$RUNNER_TEMP/token-refresh-keys.txt"
          backup_dir="$RUNNER_TEMP/token-refresh-backup"
          [ -f "$refresh_keys" ] || exit 0

          while IFS= read -r key; do
            [ -n "$key" ] || continue
            target="images/migration/webp/${key}.webp"
            backup="$backup_dir/${key}.webp"
            if [ ! -f "$target" ] && [ -f "$backup" ]; then
              echo "Restoring previous image for $key because no replacement was created"
              cp "$backup" "$target"
            fi
          done < "$refresh_keys"

      - name: Commit and push changes
        run: |
          # Use GitHub's official bot identity for commits made by this workflow.
          # The email is the no-reply address tied to the github-actions[bot] user
          # (41898282 is its account ID); attributes commits to the bot in the UI
          # and avoids exposing any real contributor email.
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add images/migration/webp scripts/update-tokens/colors.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore: update tokens [skip ci]"
          git push
