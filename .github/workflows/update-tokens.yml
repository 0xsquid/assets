name: Update tokens

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

concurrency:
  group: update-tokens
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update-tokens:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Install system dependencies
        run: yarn setup:linux

      - name: Install Node dependencies
        run: yarn install --frozen-lockfile

      - name: Run update-tokens
        env:
          SQUID_API_URL: ${{ secrets.SQUID_API_URL }}
          SQUID_INTEGRATOR_ID: ${{ secrets.SQUID_INTEGRATOR_ID }}
        run: yarn update-tokens

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add images/migration/webp scripts/update-tokens/colors.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore: update tokens [skip ci]"
          git push
